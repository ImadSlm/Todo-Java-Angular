<div class="container">
  <h1>{{ title }}</h1>

  <div class="form-section">
    <h2>Ajouter une nouvelle tâche</h2>
    <div class="form-group">
      <label for="title">Titre *</label>
      <input
        type="text"
        id="title"
        [(ngModel)]="newTodo.title"
        placeholder="Entrez le titre de la tâche"
      />
    </div>
    <button (click)="addTodo()">Ajouter</button>
  </div>

  <div class="todos-section">
    <h2>Tâches</h2>
    <div *ngIf="todos.length === 0" class="empty-message">
      Aucune tâche pour le moment. Créez-en une !
    </div>
    <div
      *ngFor="let todo of todos"
      [class.completed]="todo.completed"
      class="todo-item"
    >
      <div class="todo-content" (click)="toggleTodo(todo)">
        <div class="todo-title">
          {{ todo.title }}
          <span *ngIf="todo.completed"> ✓</span>
        </div>
      </div>
      <div class="todo-actions">
        <button class="delete" (click)="deleteTodo(todo.id)">Supprimer</button>
      </div>
    </div>
  </div>
</div>
